<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Песочница кода</title>

    <!-- Prism.js -->
    <link
      id="prism-theme"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css"
      rel="stylesheet"
    />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-scss.min.js"
      defer
    ></script>

    <!-- Стили -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/glass.css" />
  </head>
  <body data-theme="dark">
    <!-- Шапка -->
    <header class="header">
      <h1><span>☳</span>Code<span>Sandbox</span></h1>
      <div class="header-actions">
        <div class="settings-wrapper">
          <!-- Кнопка настроек с SVG-шестерёнкой -->
          <button id="settingsBtn" class="btn settings-btn" title="Настройки">
            <svg
              class="icon-gear"
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="currentColor"
            >
              <path
                d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66Z"
              />
            </svg>
          </button>
          <div id="settingsPanel" class="settings-panel" style="display: none">
            <div class="settings-header"><h3>Настройки</h3></div>
            <div class="settings-body">
              <div class="settings-content" id="settingsContent">
                <!-- Вкладка "Тема" -->
                <div
                  class="settings-tab-content active"
                  data-tab-content="theme"
                >
                  <div class="settings-section">
                    <h4 class="section-title">Тема оформления</h4>
                    <div class="theme-options">
                      <!-- те же опции тем -->
                      <div class="theme-option-wrapper">
                        <button class="theme-option" data-theme="light">
                          <svg
                            class="icon-theme"
                            viewBox="0 0 24 24"
                            width="18"
                            height="18"
                            fill="currentColor"
                          >
                            <path
                              d="M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0-5a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1zM5.6 5.6a1 1 0 0 1 1.4 0l1.4 1.4a1 1 0 1 1-1.4 1.4L5.6 7a1 1 0 0 1 0-1.4zm11.3 11.3a1 1 0 0 1 1.4 0l1.4 1.4a1 1 0 0 1-1.4 1.4l-1.4-1.4a1 1 0 0 1 0-1.4zM2 11a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1zm16 0a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2h-2a1 1 0 0 1-1-1zM5.6 18.4a1 1 0 0 1 0-1.4l1.4-1.4a1 1 0 1 1 1.4 1.4L7 18.4a1 1 0 0 1-1.4 0zm11.3-11.3a1 1 0 0 1 0-1.4l1.4-1.4a1 1 0 0 1 1.4 1.4L18.4 7a1 1 0 0 1-1.4 0z"
                            />
                          </svg>
                          Светлая
                          <span class="theme-arrow">▸</span>
                        </button>
                        <div class="color-palette" data-theme="light">
                          <button
                            class="color-swatch"
                            data-color="#0078D4"
                            style="background: #0078d4"
                            title="Синий"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#3a8eee"
                            style="background: #3a8eee"
                            title="Голубой"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#8e44ad"
                            style="background: #8e44ad"
                            title="Фиолетовый"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#c0392b"
                            style="background: #c0392b"
                            title="Красный"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#e67e22"
                            style="background: #e67e22"
                            title="Оранжевый"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#27ae60"
                            style="background: #27ae60"
                            title="Зелёный"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#f1c40f"
                            style="background: #f1c40f"
                            title="Жёлтый"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#e91e63"
                            style="background: #e91e63"
                            title="Розовый"
                          ></button>
                        </div>
                      </div>
                      <div class="theme-option-wrapper">
                        <button class="theme-option active" data-theme="dark">
                          <svg
                            class="icon-theme"
                            viewBox="0 0 24 24"
                            width="18"
                            height="18"
                            fill="currentColor"
                          >
                            <path
                              d="M21.75 14.5A9.75 9.75 0 0 1 9.5 2.25 9.75 9.75 0 0 0 2.25 12a9.75 9.75 0 0 0 9.75 9.75 9.75 9.75 0 0 0 9.75-7.25z"
                            />
                          </svg>
                          Тёмная
                          <span class="theme-arrow">▸</span>
                        </button>
                        <div class="color-palette" data-theme="dark">
                          <button
                            class="color-swatch"
                            data-color="#0078D4"
                            style="background: #0078d4"
                            title="Синий"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#3a8eee"
                            style="background: #3a8eee"
                            title="Голубой"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#8e44ad"
                            style="background: #8e44ad"
                            title="Фиолетовый"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#c0392b"
                            style="background: #c0392b"
                            title="Красный"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#e67e22"
                            style="background: #e67e22"
                            title="Оранжевый"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#27ae60"
                            style="background: #27ae60"
                            title="Зелёный"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#f1c40f"
                            style="background: #f1c40f"
                            title="Жёлтый"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#e91e63"
                            style="background: #e91e63"
                            title="Розовый"
                          ></button>
                        </div>
                      </div>
                      <div class="theme-option-wrapper">
                        <button class="theme-option" data-theme="darker">
                          <svg
                            class="icon-theme"
                            viewBox="0 0 24 24"
                            width="18"
                            height="18"
                            fill="currentColor"
                          >
                            <circle
                              cx="12"
                              cy="12"
                              r="10"
                              fill="none"
                              stroke="currentColor"
                              stroke-width="2"
                            />
                            <path d="M12 2a10 10 0 0 1 0 20V2z" />
                          </svg>
                          Очень тёмная
                          <span class="theme-arrow">▸</span>
                        </button>
                        <div class="color-palette" data-theme="darker">
                          <button
                            class="color-swatch"
                            data-color="#0078D4"
                            style="background: #0078d4"
                            title="Синий"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#3a8eee"
                            style="background: #3a8eee"
                            title="Голубой"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#8e44ad"
                            style="background: #8e44ad"
                            title="Фиолетовый"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#c0392b"
                            style="background: #c0392b"
                            title="Красный"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#e67e22"
                            style="background: #e67e22"
                            title="Оранжевый"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#27ae60"
                            style="background: #27ae60"
                            title="Зелёный"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#f1c40f"
                            style="background: #f1c40f"
                            title="Жёлтый"
                          ></button>
                          <button
                            class="color-swatch"
                            data-color="#e91e63"
                            style="background: #e91e63"
                            title="Розовый"
                          ></button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <!-- Вкладка "Эффекты" -->
                <div class="settings-tab-content" data-tab-content="effects">
                  <div class="settings-section">
                    <h4 class="section-title">Стеклянный эффект</h4>
                    <div class="effect-options">
                      <button id="glassToggleBtn" class="effect-option">
                        <svg
                          class="icon-effect"
                          viewBox="0 0 24 24"
                          width="16"
                          height="16"
                          fill="currentColor"
                        >
                          <path
                            d="M3 3h18v18H3V3zm2 2v14h14V5H5zm2 2h10v6H7V7zm0 8h10v2H7v-2z"
                          />
                        </svg>
                        Стеклянный эффект
                      </button>
                    </div>
                  </div>
                  <div
                    class="settings-section"
                    id="animationSection"
                    style="display: none"
                  >
                    <h4 class="section-title">Вариант оформления</h4>
                    <div class="effect-options">
                      <button
                        id="styleSemicircleBtn"
                        class="effect-option active"
                      >
                        🌓 Полукруг
                      </button>
                      <button id="styleGradientBtn" class="effect-option">
                        🌈 Градиент
                      </button>
                      <button id="styleGlowBtn" class="effect-option">
                        ✨ Сияние
                      </button>
                    </div>
                  </div>
                  <div
                    class="settings-section"
                    id="animationToggleSection"
                    style="display: none"
                  >
                    <h4 class="section-title">Анимация</h4>
                    <div class="effect-options">
                      <button id="animateToggleBtn" class="effect-option">
                        🌀 Анимация
                      </button>
                    </div>
                  </div>
                  <div
                    class="settings-section"
                    id="circleSizeSection"
                    style="display: none"
                  >
                    <h4 class="section-title">Размер эффекта</h4>
                    <div class="circle-size-control">
                      <input
                        type="range"
                        id="circleSizeSlider"
                        min="50"
                        max="150"
                        step="5"
                        value="100"
                      />
                      <span id="circleSizeValue" class="circle-size-value"
                        >100%</span
                      >
                    </div>
                  </div>
                </div>
                <!-- Вкладка "Редактор" -->
                <div class="settings-tab-content" data-tab-content="editor">
                  <div class="settings-section">
                    <h4 class="section-title">Размер шрифта</h4>
                    <div class="font-size-control">
                      <input
                        type="number"
                        id="fontSizeInput"
                        class="font-size-input"
                        min="10"
                        max="40"
                        step="1"
                        placeholder="14"
                      />
                      <span class="font-size-unit">px</span>
                    </div>
                  </div>
                  <div class="settings-section">
                    <h4 class="section-title">Шрифт редактора</h4>
                    <div class="font-family-control">
                      <select id="fontFamilySelect" class="font-select">
                        <option value="'Consolas', 'Courier New', monospace">
                          Consolas (по умолчанию)
                        </option>
                        <option value="'Cascadia Code', monospace">
                          Cascadia Code
                        </option>
                        <option value="monospace">Monospace</option>
                      </select>
                      <div
                        class="font-upload-zone"
                        id="fontUploadZone"
                        title="Перетащите файл шрифта (.ttf, .otf, .woff, .woff2) или кликните для выбора"
                      >
                        <span class="font-upload-plus">+</span>
                      </div>
                      <input
                        type="file"
                        id="fontFileInput"
                        accept=".ttf,.otf,.woff,.woff2"
                        style="display: none"
                      />
                    </div>
                  </div>
                </div>
              </div>
              <!-- Вкладки справа с SVG-иконками -->
              <div class="settings-tabs" id="settingsTabs">
                <button class="settings-tab active" data-tab="theme">
                  <svg
                    class="icon-tab"
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                    fill="currentColor"
                  >
                    <path
                      d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
                    />
                  </svg>
                  Тема
                </button>
                <button class="settings-tab" data-tab="effects">
                  <svg
                    class="icon-tab"
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                    fill="currentColor"
                  >
                    <path
                      d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"
                    />
                  </svg>
                  Эффекты
                </button>
                <button class="settings-tab" data-tab="editor">
                  <svg
                    class="icon-tab"
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                    fill="currentColor"
                  >
                    <path
                      d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"
                    />
                  </svg>
                  Редактор
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Основной контейнер -->
    <div class="app" id="appContainer">
      <div class="editor-panel" id="editorPanel">
        <div class="panel-tabs" id="tabContainer">
          <button class="panel-tab active" data-tab="html">
            HTML <span class="badge">разметка</span>
          </button>
          <div class="tab-wrapper">
            <button class="panel-tab tab-main" data-tab="css">
              <span class="tab-label">CSS</span>
              <span class="badge">стили</span>
            </button>
            <span
              class="tab-arrow"
              id="cssToggleArrow"
              title="Переключить язык стилей"
              >▾</span
            >
            <div class="tab-dropdown" id="cssLangDropdown">
              <button class="dropdown-item active" data-lang="css">CSS</button>
              <button class="dropdown-item" data-lang="scss">SCSS</button>
            </div>
          </div>
          <button class="panel-tab" data-tab="js">
            JS <span class="badge">логика</span>
          </button>
        </div>
        <div class="editor-wrapper">
          <div class="line-numbers" id="lineNumbers">1</div>
          <div class="editor-area" id="editorArea">
            <div id="highlightLayer"></div>
            <div id="colorDecorators"></div>
            <textarea id="codeEditor" spellcheck="false"></textarea>
            <div
              id="autocompleteBox"
              class="autocomplete-box"
              style="display: none"
            ></div>
          </div>
          <div class="minimap-container" id="minimapContainer">
            <canvas id="minimapCanvas"></canvas>
            <div id="minimapViewport" class="minimap-viewport"></div>
          </div>
        </div>
      </div>

      <div class="resize-handle" id="resizeHandle">
        <div class="resize-handle-grip"></div>
      </div>

      <div class="preview-panel" id="previewPanel">
        <div class="preview-toolbar">
          <span class="dot"></span>
          <span class="preview-label">предпросмотр</span>
          <div class="url-display">about:blank</div>
          <button class="btn" id="refreshPreviewBtn">⟳</button>
        </div>
        <iframe id="previewFrame" sandbox="allow-scripts"></iframe>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-item"
        ><span class="key">строки:</span
        ><span class="value" id="linesCount">1</span></span
      >
      <span class="status-item"
        ><span class="key">символы:</span
        ><span class="value" id="charsCount">0</span></span
      >
      <span class="status-item"
        ><span class="key">вкладка:</span
        ><span class="value" id="currentTab">HTML</span></span
      >
      <span class="status-item"
        ><span class="key">тема:</span
        ><span class="value" id="currentThemeName">тёмная</span></span
      >
      <span class="status-item"
        ><span class="key">статус:</span
        ><span class="value" id="statusText">● готово</span></span
      >
    </div>

    <!-- Шаблон цветовой палитры (кастомный ColorPicker) -->
    <div id="colorPickerPopup" class="color-picker-popup" style="display: none">
      <div class="color-picker-body">
        <div class="color-hex-input-wrapper">
          <label class="color-hex-label">HEX / RGBA</label>
          <input
            type="text"
            id="colorHexInput"
            class="color-hex-input"
            placeholder="#ff0000 или rgba(255,0,0,1)"
          />
        </div>
        <div class="color-picker-alpha">
          <label>Прозрачность</label>
          <input type="range" id="alphaSlider" min="0" max="100" value="100" />
          <span id="alphaValue">100%</span>
        </div>
        <div class="color-picker-custom">
          <canvas id="colorCanvas" width="200" height="150"></canvas>
          <div class="hue-slider-wrapper">
            <input
              type="range"
              id="hueSlider"
              min="0"
              max="360"
              value="0"
              class="hue-slider"
            />
          </div>
        </div>
        <div class="rgb-inputs">
          <div class="rgb-field">
            <label class="rgb-label" style="color: #ff4d4d">R</label>
            <input type="text" id="rgbR" class="rgb-input" maxlength="3" />
          </div>
          <div class="rgb-field">
            <label class="rgb-label" style="color: #4caf50">G</label>
            <input type="text" id="rgbG" class="rgb-input" maxlength="3" />
          </div>
          <div class="rgb-field">
            <label class="rgb-label" style="color: #42a5f5">B</label>
            <input type="text" id="rgbB" class="rgb-input" maxlength="3" />
          </div>
        </div>
        <div class="color-picker-preview" id="colorPreview"></div>
      </div>
    </div>

    <script src="js/config.js" defer></script>
    <script src="js/storage.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/editor.js" defer></script>
    <script src="js/preview.js" defer></script>
    <script src="js/resize.js" defer></script>
    <script src="js/settings.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
